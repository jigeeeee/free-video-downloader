<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bilibili 扫码登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f3f5f7; }
.card { background:#fff; border-radius:16px; padding:40px 32px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.08); max-width:380px; width:100%; margin:16px; }
img { border:2px solid #f0f0f0; border-radius:12px; width:250px; height:250px; }
h2 { margin:0 0 8px; font-size:20px; color:#18191c; }
.status { margin:16px 0; font-size:14px; font-weight:500; }
.tips { margin-top:20px; font-size:13px; color:#9499a0; line-height:2; background:#f8f9fa; border-radius:12px; padding:16px; text-align:left; }
.refresh { margin-top:16px; padding:8px 24px; border:1px solid #e0e0e0; border-radius:20px; background:#fff; cursor:pointer; font-size:13px; color:#666; }
.refresh:hover { background:#f5f5f5; }
</style>
</head>
<body>
<div class="card">
  <h2>Bilibili 扫码登录</h2>
  <img id="qr" src="" alt="QR Code" style="display:none">
  <div id="status" class="status" style="color:#9499a0">正在生成二维码...</div>
  <div class="tips">
    1. 打开哔哩哔哩 App<br>
    2. 点击右上角「扫一扫」<br>
    3. 扫描二维码并确认登录<br>
    4. Cookie 自动保存
  </div>
  <button id="refresh" class="refresh" onclick="location.reload()">刷新二维码</button>
</div>
<script>
const STATUS_MAP = { waiting: '等待扫码...', scanned: '已扫描，请在手机上确认', confirmed: '登录成功！Cookie 已保存', expired: '二维码已过期' };
const COLORS = { waiting: '#9499a0', scanned: '#1677ff', confirmed: '#52c41a', expired: '#ff4d4f' };
let key = '';

async function init() {
  try {
    const r = await fetch('/api/bilibili/qrcode');
    const d = await r.json();
    key = d.qrcode_key;
    const qrImg = document.getElementById('qr');
    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(d.url)}`;
    qrImg.style.display = 'block';
    setStatus('waiting');
    poll();
  } catch(e) {
    setStatus('error');
    document.getElementById('status').textContent = '无法连接服务器';
  }
}

function setStatus(s) {
  document.getElementById('status').textContent = STATUS_MAP[s] || s;
  document.getElementById('status').style.color = COLORS[s] || '#999';
}

async function poll() {
  if (!key) return;
  try {
    const r = await fetch(`/api/bilibili/qrcode/status?qrcode_key=${key}`);
    const d = await r.json();
    setStatus(d.status);
    if (d.status === 'confirmed') {
      document.getElementById('refresh').textContent = '登录成功！';
      return;
    }
    if (d.status === 'expired') return;
  } catch(e) {}
  setTimeout(poll, 2000);
}

init();
</script>
</body>
</html>
